# Copy this into your existing ESPHome device config.
#
# Pin direction:
#   ESP TX -> LD2460 Rx2 / RX
#   ESP RX <- LD2460 Tx2 / TX

substitutions:
  ld2460_tx_pin: GPIO16
  ld2460_rx_pin: GPIO17

packages:
  ld2460:
    url: https://github.com/ciriousjoker/esphome_ld2460
    ref: v0.1.0
    files:
      - ld2460.yaml
    refresh: 1d
